<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mattolivr - Infnet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="window">
    <div class="header">
      <img src="assets/folder_documents.png">
      <h2>Caderno de Exercícios</h2>
      <button class="min">
        <i class="fa-solid fa-window-minimize"></i>
      </button>
      <button class="max">
        <i class="fa-regular fa-window-maximize"></i>
      </button>
      <button class="close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="body">
      <div class="credits">
        <span>By: Mattolivr</span>
        <div class="logo">
          <img src="assets/logo.png">
        </div>
      </div>
      <div class="toolbar">
        <div>
          <button class="backward">
            <div>
              <i class="fa-solid fa-arrow-left"></i>
            </div>
            <span>Back</span>
          </button>
          <button class="forward">
            <div>
              <i class="fa-solid fa-arrow-right"></i>
            </div>
          </button>
        </div>
        <div>
          <button>
            <img src="assets/document_xps.png">
            Exportar para PDF
          </button>
        </div>
      </div>
      <div class="address">
        <span>Address</span>
        <span class="url">
          <img src="assets/folder_documents.png">
          C:\Caderno de Exercícios
        </span>
      </div>
      <section>
        <aside>
        </aside>
        <main>
          <button class="folder">
            <img src="assets/bat.png">
            Bloco 1 - Fundamentos de Programação
          </button>
          <button class="folder">
            <img src="assets/tiff.png">
            Bloco 2 - Front-end com Frameworks
          </button>
        </main>
      </section>
    </div>
  </div>
</body>
</html>
